<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thea — نظام المعلومات الصحية المتكامل</title>
  <meta name="description" content="ثيا — منصة معلومات صحية متكاملة تغطي رحلة المريض كاملة: من العيادة والطوارئ والتنويم، إلى المختبر والأشعة والصيدلة والفوترة والموارد البشرية." />
  <link rel="preload" href="fonts/thmanyahsans-regular.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/thmanyahsans-medium.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/thmanyahsans-bold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/thmanyahsans-black.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/thmanyahserifdisplay-black.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.css" />
  <link rel="stylesheet" href="styles.css" />
  <script>window.__THEA_CINEMATIC__ = true;</script>
</head>
<body>
  <!-- ============ CINEMATIC WEBGL EXPERIENCE ============ -->
  <canvas id="gl"></canvas>

  <div id="splash" class="splash">
    <div class="splash-mark"></div>
    <div class="splash-name">THEA</div>
    <div class="splash-bar"><i></i></div>
    <div class="splash-pct">0%</div>
  </div>

  <header id="chrome-nav" class="chrome-nav"></header>

  <div id="stage" class="stage">
    <div id="pinned" class="pinned">
      <div id="panels" class="panels"></div>
    </div>
  </div>

  <div id="chrome-bar" class="chrome-bar"></div>

  <!-- ============ DOM FALLBACK (no-WebGL / reduced-motion) ============ -->
  <div id="dom-fallback">
    <canvas id="bg-canvas"></canvas>
    <div class="aurora">
      <span class="blob blob-1"></span>
      <span class="blob blob-2"></span>
      <span class="blob blob-3"></span>
    </div>
    <div class="grain"></div>

    <header class="nav" id="nav">
      <a href="#hero" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">THEA</span>
      </a>
      <nav class="nav-links" id="nav-links"></nav>
      <div class="nav-actions">
        <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">
          <span data-lang-en>العربية</span><span data-lang-ar>English</span>
        </button>
        <a href="#contact" class="btn btn-ghost" data-i18n="navCta"></a>
      </div>
    </header>

    <main>
      <section class="hero" id="hero">
        <div class="hero-inner">
          <div class="eyebrow reveal" data-i18n="heroEyebrow"></div>
          <h1 class="hero-title reveal" data-i18n-html="heroTitle"></h1>
          <p class="hero-sub reveal" data-i18n="heroSub"></p>
          <div class="hero-cta reveal">
            <a href="#platforms" class="btn btn-primary" data-i18n="heroPrimary"></a>
            <a href="#journey" class="btn btn-ghost" data-i18n="heroSecondary"></a>
          </div>
          <div class="hero-stats reveal" id="hero-stats"></div>
        </div>
      </section>

      <section class="strip" id="trust"><div class="strip-track" id="strip-track"></div></section>

      <section class="section" id="journey">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="journeyKicker"></span>
          <h2 data-i18n="journeyTitle"></h2>
          <p data-i18n="journeyDesc"></p>
        </div>
        <div class="journey-flow" id="journey-flow"></div>
      </section>

      <section class="section" id="platforms">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="coreKicker"></span>
          <h2 data-i18n="coreTitle"></h2>
          <p data-i18n="coreDesc"></p>
        </div>
        <div class="pillars" id="pillars"></div>
      </section>

      <section class="section" id="specialties">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="specKicker"></span>
          <h2 data-i18n="specTitle"></h2>
          <p data-i18n="specDesc"></p>
        </div>
        <div class="chip-grid" id="spec-grid"></div>
      </section>

      <section class="section" id="enterprise">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="entKicker"></span>
          <h2 data-i18n="entTitle"></h2>
          <p data-i18n="entDesc"></p>
        </div>
        <div class="ent-grid" id="ent-grid"></div>
      </section>

      <section class="section" id="ops">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="opsKicker"></span>
          <h2 data-i18n="opsTitle"></h2>
          <p data-i18n="opsDesc"></p>
        </div>
        <div class="chip-grid" id="ops-grid"></div>
      </section>

      <section class="section" id="infra">
        <div class="section-head reveal">
          <span class="kicker" data-i18n="infraKicker"></span>
          <h2 data-i18n="infraTitle"></h2>
          <p data-i18n="infraDesc"></p>
        </div>
        <div class="infra-grid" id="infra-grid"></div>
      </section>

      <section class="cta" id="contact">
        <div class="cta-card reveal">
          <h2 data-i18n="ctaTitle"></h2>
          <p data-i18n="ctaDesc"></p>
          <div class="cta-actions">
            <a href="mailto:thea@thea.com.sa" class="btn btn-primary" data-i18n="ctaPrimary"></a>
            <a href="#hero" class="btn btn-ghost" data-i18n="ctaSecondary"></a>
          </div>
          <div class="cta-meta" data-i18n="ctaMeta"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-brand"><span class="brand-mark" aria-hidden="true"></span><span class="brand-name">THEA</span></div>
      <p class="footer-line" data-i18n="footerLine"></p>
      <p class="footer-copy">© <span id="year"></span> Thea Health · thea@thea.com.sa</p>
    </footer>
  </div>

  <!-- ============ LIBS ============ -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }}
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
